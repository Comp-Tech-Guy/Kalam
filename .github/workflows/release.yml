name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Decode signing key
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}")
          $path = Join-Path $env:RUNNER_TEMP "kalam.key"
          [IO.File]::WriteAllBytes($path, $bytes)
          echo "TAURI_SIGNING_PRIVATE_KEY=$path" >> $env:GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri"

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ inputs.version }}"
          } else {
            $ver = "${{ github.ref }}" -replace '^refs/tags/v', ''
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Write version to tauri.conf.json
        shell: pwsh
        working-directory: app
        run: |
          $path = "src-tauri/tauri.conf.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.version = "${{ steps.version.outputs.version }}"
          $json | ConvertTo-Json -Depth 32 | Set-Content $path

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: See the assets to download and install this version.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --bundles msi
